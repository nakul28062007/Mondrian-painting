<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 0;
    }
    .container{
      height: 780px;
      width: 740px;
      display: grid;
      background-color: black;
      gap: 10px;
      grid-template-columns: repeat(15, 40px);
      grid-template-rows: repeat(15,40px);
      border: 8px solid black;
      transform: scale(0.9)
    }
    .white{
      background-color: #D7D4D2;
    }
    .yellow{
      background-color:#D8CE60;
    }
    .black{
      background-color: black;
    }
    .blue{
      background-color: #2D316E;
    }
    .orange{
      background-color: #CC6750;
    }
    .red{
      background-color: #D7362A;
    }

    .no_1{
      grid-area: 1/1/3/5;
    }
    .no_2{
      grid-area: 1/5/3/11;
    }
    .no_3{
      grid-area: 1/11/3/15;
    }
    .no_4{
      grid-area: 1/15/3/16;
    }
    .no_5{
      grid-area: 3/1/7/3;
    }
    .no_6{
      grid-area: 3/3/11/11;
    }
    .no_7{
      grid-area: 3/11/7/15;
    }
    .no_8{
      grid-area: 3/15/11/16;
    }
    .no_9{
      grid-area: 7/1/13/3;
    }
    .no_10{
      grid-area: 7/11/11/13;
    }
    .no_11{
      grid-area: 7/13/11/15;
    }
    .no_12{
      grid-area: 13/1/17/3;
    }
    .no_13{
      grid-area: 11/3/15/7;
    }
    .no_14{
      grid-area: 11/7/13/11;
    }
    .no_15{
      grid-area: 13/7/15/11;
    }
    .no_16{
      grid-area: 11/11/13/15;
    }
    .no_17{
      grid-area: 13/11/16/15;
    }
    .no_18{
      grid-area: 11/15/17/16;
    }
    .no_19{
      grid-area: 15/3/17/7;
    }
    .no_20{
      grid-area: 15/7/16/11;
    }
    .no_21{
      grid-area: 16/7/17/15;
    }
    


  
  </style>
</head>

<body>
  <div class="container">
    <div class="white no_1"></div>
    <div class="white no_2"></div>
    <div class="yellow no_3"></div>
    <div class="white no_4"></div>
    <div class="white no_5"></div>
    <div class="red no_6"></div>
    <div class="yellow no_7"></div>
    <div class="white no_8"></div>
    <div class="white no_9"></div>
    <div class="white no_10"></div>
    <div class="white no_11"></div>
    <div class="yellow no_12"></div>
    <div class="black no_13"></div>
    <div class="white no_14"></div>
    <div class="white no_15"></div>
    <div class="white no_16"></div>
    <div class="blue no_17"></div>
    <div class="orange no_18"></div>
    <div class="white no_19"></div>
    <div class="black no_20"></div>
    <div class="white no_21"></div>
  </div>
</body>

</html>
